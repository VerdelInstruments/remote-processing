AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sherlock mass spectrometry pipeline — Rust Lambda (container image, ARM64)

Globals:
  Function:
    Timeout: 900
    MemorySize: 10240

Parameters:
  DataBucketName:
    Type: String
    Default: verdel-sherlock-data
  ResultsBucketName:
    Type: String
    Default: verdel-sherlock-results

Resources:
  SherlockFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - arm64
      Environment:
        Variables:
          RUST_LOG: info
          RESULTS_BUCKET: !Ref ResultsBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucketName
        - S3CrudPolicy:
            BucketName: !Ref ResultsBucketName
    Metadata:
      DockerTag: sherlock-runner
      DockerContext: sherlock-runner
      Dockerfile: Dockerfile

  ResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ResultsBucketName
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldRuns
            Status: Enabled
            ExpirationInDays: 90

Outputs:
  SherlockFunctionArn:
    Value: !GetAtt SherlockFunction.Arn
  ResultsBucketName:
    Value: !Ref ResultsBucket
